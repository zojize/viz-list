<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>StructViz</title>
    <meta
      name="description"
      content="Interactive C++ data structure visualizer — step through code and watch structs, pointers, and memory come alive"
    />

    <!-- Open Graph -->
    <meta property="og:title" content="StructViz" />
    <meta
      property="og:description"
      content="Interactive C++ data structure visualizer — step through code and watch structs, pointers, and memory come alive"
    />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StructViz" />
    <meta
      name="twitter:description"
      content="Interactive C++ data structure visualizer — step through code and watch structs, pointers, and memory come alive"
    />
  </head>
  <body class="font-sans text-hex-404040 dark:text-white dark:bg-hex-121212 overscroll-y-none">
    <div id="app"></div>
    <noscript>
      <div>Please enable JavaScript to use this application.</div>
    </noscript>
    <script>
      ;(function () {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        const setting = localStorage.getItem('color-schema') || 'auto'
        if (setting === 'dark' || (prefersDark && setting !== 'light'))
          document.documentElement.classList.toggle('dark', true)
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
